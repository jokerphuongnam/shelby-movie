events {
  worker_connections 1024;
}

http {
  # Reflect the incoming Origin back only for localhost (any port) —
  # covers Next.js dev server regardless of which port it binds to.
  map $http_origin $cors_origin {
    default   "";
    "~^http://localhost(:[0-9]+)?$" $http_origin;
  }

  upstream api_gateway {
    server api-gateway:3000;
  }

  upstream stream_nodes {
    server stream-node:4000;
  }

  upstream frontend {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name _;

    # Allow up to 2 GB for video uploads
    client_max_body_size 2G;

    # ── Health Check ───────────────────────────────────────────────────────────
    location = /health {
      proxy_pass http://api_gateway/health;
      proxy_set_header Host $host;
    }

    # ── API Gateway ────────────────────────────────────────────────────────────
    # Proxies /api/* → api-gateway:3000/api/*
    location /api/ {
      # Suppress upstream CORS headers — nginx owns CORS at the edge
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      add_header 'Access-Control-Allow-Origin'  $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, x-session-token' always;
      add_header 'Access-Control-Max-Age'       1728000 always;

      # Short-circuit preflight without touching upstream
      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass         http://api_gateway;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Video Stream ───────────────────────────────────────────────────────────
    # Proxies /stream/* → stream-node:4000/stream/*
    location /stream/ {
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      add_header 'Access-Control-Allow-Origin'   $cors_origin always;
      add_header 'Access-Control-Allow-Methods'  'GET, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers'  'Content-Type, x-session-token, Range, If-Range' always;
      # Browsers must see Content-Range and Accept-Ranges to support seeking
      add_header 'Access-Control-Expose-Headers' 'Content-Range, Content-Length, Accept-Ranges' always;
      add_header 'Access-Control-Max-Age'        1728000 always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass         http://stream_nodes;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Explicit Range / If-Range passthrough — required for video seeking (206)
      proxy_set_header   Range    $http_range;
      proxy_set_header   If-Range $http_if_range;

      # Disable buffering — sends bytes to the browser as they arrive from
      # stream-node, which is essential for low-latency video playback
      proxy_buffering    off;
      proxy_cache        off;

      # Keep connections alive for long-running streams (up to 1 hour)
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── Upload ─────────────────────────────────────────────────────────────────
    # Proxies /upload/* → stream-node:4000/upload/*
    location /upload/ {
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      add_header 'Access-Control-Allow-Origin'  $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
      add_header 'Access-Control-Max-Age'       1728000 always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass         http://stream_nodes;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Don't buffer the request body — stream it directly to the upstream
      # so large video chunks don't fill nginx's disk before being forwarded
      proxy_request_buffering off;
      proxy_read_timeout      600s;
      proxy_send_timeout      600s;
    }

    # ── Frontend ────────────────────────────────────────────────────────────────
    # Catch-all: everything else → Next.js on frontend:3000
    location / {
      proxy_pass         http://frontend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Required for Next.js HMR websocket (dev) and static asset caching
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
