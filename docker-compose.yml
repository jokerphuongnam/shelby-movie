services:
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: api-gateway
    env_file: ./apps/api-gateway/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/shelbymovie
      - NATS_URL=nats://nats-server:4222
      - PORT=3000
      - ALPHA_SEED=${ALPHA_SEED:-false}
    ports:
      - "8080:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      nats-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - shelby-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  stream-node:
    build:
      context: .
      dockerfile: apps/stream-node/Dockerfile
    container_name: stream-node
    env_file: ./apps/stream-node/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats-server:4222
      - PORT=4000
    depends_on:
      redis:
        condition: service_healthy
      nats-server:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4g
    networks:
      - shelby-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:7
    container_name: mongodb
    command:
      - mongod
      - --quiet
      - --setParameter
      - "logComponentVerbosity={network:{verbosity:-1},command:{verbosity:-1}}"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 40s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - shelby-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - shelby-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  nats-server:
    image: nats:2.10-alpine
    container_name: nats-server
    command: ["-js"]
    networks:
      - shelby-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Production / on-chain mode — ./run.sh dev  (--profile onchain)
  # Accessible at http://localhost:4545 and proxied via nginx on port 80
  frontend-onchain:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Pass CACHE_BUST=$(date +%s) to force a fresh Next.js build
        CACHE_BUST: ${CACHE_BUST:-1}
        NEXT_PUBLIC_API_URL: http://localhost
        NEXT_PUBLIC_STREAM_URL: http://localhost
        NEXT_PUBLIC_APTOS_NETWORK: testnet
        NEXT_PUBLIC_APTOS_NODE_URL: https://api.shelbynet.shelby.xyz/shelby
        NEXT_PUBLIC_SHELBY_CONTRACT: ${NEXT_PUBLIC_SHELBY_CONTRACT:-0x85fdb9a176ab8ef1d9d9c1b60d60b3924f0800ac1de1cc2085fb0b8bb4988e6a}
        NEXT_PUBLIC_SHELBY_API_KEY: ${NEXT_PUBLIC_SHELBY_API_KEY:-}
        NEXT_PUBLIC_APT_PRICE_MULTIPLIER: ${NEXT_PUBLIC_APT_PRICE_MULTIPLIER:-0.5}
        NEXT_PUBLIC_TREASURY_ADDRESS: ${NEXT_PUBLIC_TREASURY_ADDRESS:-0x0}
        NEXT_PUBLIC_ALPHA_TEST: "false"
        NEXT_PUBLIC_MOCK_VIDEO_URL: ""
    container_name: frontend-onchain
    environment:
      INTERNAL_API_URL: http://api-gateway:3000
    profiles:
      - onchain
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "4545:3000"
    networks:
      shelby-net:
        aliases:
          - frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Alpha test environment — off-chain mode, no Petra wallet required
  # Start with: docker-compose --env-file .env.alpha --profile alpha up frontend-alpha
  frontend-alpha:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_STREAM_URL: http://localhost
        NEXT_PUBLIC_APTOS_NETWORK: testnet
        NEXT_PUBLIC_APTOS_NODE_URL: https://api.shelbynet.shelby.xyz/shelby
        NEXT_PUBLIC_SHELBY_CONTRACT: ${NEXT_PUBLIC_SHELBY_CONTRACT:-0x85fdb9a176ab8ef1d9d9c1b60d60b3924f0800ac1de1cc2085fb0b8bb4988e6a}
        NEXT_PUBLIC_SHELBY_API_KEY: ${NEXT_PUBLIC_SHELBY_API_KEY:-}
        NEXT_PUBLIC_APT_PRICE_MULTIPLIER: ${NEXT_PUBLIC_APT_PRICE_MULTIPLIER:-0.5}
        NEXT_PUBLIC_TREASURY_ADDRESS: ${NEXT_PUBLIC_TREASURY_ADDRESS:-0x0}
        NEXT_PUBLIC_ALPHA_TEST: "true"
        NEXT_PUBLIC_MOCK_VIDEO_URL: ${NEXT_PUBLIC_MOCK_VIDEO_URL:-https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4}
    container_name: frontend-alpha
    environment:
      # Runtime var for Next.js server components — not baked into client bundle
      INTERNAL_API_URL: http://api-gateway:3000
    profiles:
      - alpha
    ports:
      - "4546:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - shelby-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    profiles:
      - onchain
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      stream-node:
        condition: service_started
      frontend-onchain:
        condition: service_started
    networks:
      - shelby-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  shelby-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
